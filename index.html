    <!-- 이하 생략 -->

    <h1 id="main-title">ㅈㅏㄱㅡㄱㄱㅗㅏㅂㅏㄴㅇㅡㅇ</h1>

    <h1 id="main-title">ㅈㅏㄱㅡㄱㄱㅗㅏㅂㅏㄴㅇㅡㅇ</h1>
    <div id="canvas-container"></div>

    <!-- 1. 집 캐릭터 팝업 모달창 -->
    <div id="speech-popup" class="hidden">
        <div class="popup-content">
            <button id="popup-close-btn">&times;</button>
            <img class="popup-img" src="image/newheon_qrCode.png" alt="popup image">
            <p class="popup-text">테스트입니다 -자극과반응</p>
        </div>
    </div>

    <!-- 2. 조약돌 Make.com 연동 방명록 모달창 -->
    <div id="guestbookPopup" class="guestbook-overlay" style="display: none;">
      <div class="pebble-guestbook">
        <button onclick="closeGuestbookPopup()" class="guestbook-close-btn">✕</button>
        <h3 class="guestbook-title">조약돌에 방명록 남기기</h3>
        <input type="text" id="nicknameInput" class="guestbook-input" placeholder="닉네임" />
        <textarea id="commentInput" class="guestbook-textarea" placeholder="어떤 이야기를 남기고 싶으신가요?" rows="3"></textarea>
        <button onclick="submitComment()" class="guestbook-submit-btn">등록하기</button>
      </div>
    </div>

    <!-- 3. 사진/플립북 상세 보기 확대 모달창 -->
    <div id="image-detail-modal" class="image-modal-overlay" style="display: none;">
        <div class="image-modal-content">
            <button onclick="closeImageModal()" class="image-modal-close-btn">&times;</button>
            <img id="detail-modal-img" src="" alt="상세 이미지">
            <div class="image-modal-caption" id="detail-modal-caption">캡션 내용</div>
            <!-- more 버튼 (현재는 빈 링크 #) -->
            <a href="#" id="detail-modal-more-btn" class="image-modal-more-btn" target="_blank">more</a>
        </div>
    </div>


    <!-- 스크립트 로드 (순서 중요) -->
